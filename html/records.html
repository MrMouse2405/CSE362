<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-base-200">

<div class="container mx-auto p-6">

    <!-- Page Header -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Records</h1>
        <a href="/records_new.html" class="btn btn-primary">+ New Record</a>
    </div>

    <!-- Alpine.js Component -->
    <div x-data="{
        records: [],
        loading: true,
        searchQuery: '',
        async fetchRecords() {
            try {
                const url = this.searchQuery.trim()
                    ? '/api/v0/records?q=' + encodeURIComponent(this.searchQuery.trim())
                    : '/api/v0/records';
                const response = await fetch(url);
                this.records = await response.json();
            } catch (error) {
                console.error('Failed to fetch records:', error);
            } finally {
                this.loading = false;
            }
        }
    }" x-init="fetchRecords()">

        <!-- Search -->
        <div class="flex gap-2 mb-4">
            <input type="text"
                   x-model="searchQuery"
                   placeholder="Search by title..."
                   class="input input-bordered w-full max-w-sm"
                   @keydown.enter.prevent="fetchRecords()">
            <button @click="fetchRecords()" class="btn btn-primary">Search</button>
            <button @click="searchQuery = ''; fetchRecords()" class="btn btn-ghost">Clear</button>
        </div>

        <!-- Loading State -->
        <div x-show="loading" class="text-center py-8">
            <span class="loading loading-spinner loading-lg"></span>
        </div>

        <!-- Empty State -->
        <div x-show="!loading && records.length === 0" class="text-center py-8">
            <p class="text-base-content/60">No records found.</p>
            <a href="/records_new.html" class="btn btn-primary mt-4">Create your first record</a>
        </div>

        <!-- Records Table -->
        <div x-show="!loading && records.length > 0" class="overflow-x-auto">
            <table class="table table-zebra w-full">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="record in records" :key="record.id">
                        <tr>
                            <td x-text="record.id"></td>
                            <td>
                                <a :href="'/records_view.html?id=' + record.id"
                                   class="link link-primary"
                                   x-text="record.title"></a>
                            </td>
                            <td>
                                <span class="badge"
                                      :class="{
                                          'badge-warning': record.status === 'draft',
                                          'badge-info': record.status === 'submitted',
                                          'badge-success': record.status === 'archived'
                                      }"
                                      x-text="record.status"></span>
                            </td>
                            <td>
                                <a :href="'/records_view.html?id=' + record.id"
                                   class="btn btn-sm btn-ghost">View</a>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

    </div>

    <!-- Back to Home Link -->
    <div class="mt-6">
        <a href="/" class="btn btn-ghost">← Back to Home</a>
    </div>

</div>

</body>
</html>
